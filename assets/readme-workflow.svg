<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 430" role="img" aria-labelledby="title desc">
  <title id="title">Zagrosi Forge artifact workflow</title>
  <desc id="desc">A workflow diagram showing input, project split, planning, implementation, and verification artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity=".08"/>
    </filter>
  </defs>
  <rect width="1100" height="430" rx="28" fill="url(#bg)"/>
  <rect x="20" y="20" width="1060" height="390" rx="22" fill="none" stroke="#0F766E" stroke-opacity=".18" stroke-width="2"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="56" y="68" fill="#0F172A" font-size="28" font-weight="760">The Forge artifact loop</text>
    <text x="56" y="98" fill="#475569" font-size="16">Every phase leaves durable files on disk, so Codex can resume without hidden session state.</text>
  </g>

  <g transform="translate(56 142)" filter="url(#cardShadow)">
    <rect width="178" height="150" rx="16" fill="#FFFFFF" stroke="#D1FAE5"/>
    <text x="22" y="38" fill="#0F766E" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700">INPUT</text>
    <text x="22" y="72" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="730">brief</text>
    <text x="22" y="102" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">requirements.md</text>
    <text x="22" y="126" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">chat idea</text>
  </g>

  <g transform="translate(274 142)" filter="url(#cardShadow)">
    <rect width="178" height="150" rx="16" fill="#FFFFFF" stroke="#D1FAE5"/>
    <text x="22" y="38" fill="#0F766E" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700">PROJECT</text>
    <text x="22" y="72" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="730">split</text>
    <text x="22" y="102" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">manifest.md</text>
    <text x="22" y="126" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">*/spec.md</text>
  </g>

  <g transform="translate(492 142)" filter="url(#cardShadow)">
    <rect width="178" height="150" rx="16" fill="#FFFFFF" stroke="#D1FAE5"/>
    <text x="22" y="38" fill="#0F766E" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700">PLAN</text>
    <text x="22" y="72" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="730">research</text>
    <text x="22" y="102" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">codex-plan.md</text>
    <text x="22" y="126" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">codex-plan-tdd.md</text>
  </g>

  <g transform="translate(710 142)" filter="url(#cardShadow)">
    <rect width="178" height="150" rx="16" fill="#FFFFFF" stroke="#D1FAE5"/>
    <text x="22" y="38" fill="#0F766E" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700">IMPLEMENT</text>
    <text x="22" y="72" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="730">section</text>
    <text x="22" y="102" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">sections/*.md</text>
    <text x="22" y="126" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">tests + diff</text>
  </g>

  <g transform="translate(928 142)" filter="url(#cardShadow)">
    <rect width="128" height="150" rx="16" fill="#0F766E"/>
    <text x="18" y="38" fill="#CCFBF1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700">VERIFY</text>
    <text x="18" y="72" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="730">gate</text>
    <text x="18" y="102" fill="#CCFBF1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">score</text>
    <text x="18" y="126" fill="#CCFBF1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">traceability</text>
  </g>

  <g fill="none" stroke="#14B8A6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M244 217h22"/>
    <path d="m258 208 12 9-12 9"/>
    <path d="M462 217h22"/>
    <path d="m476 208 12 9-12 9"/>
    <path d="M680 217h22"/>
    <path d="m694 208 12 9-12 9"/>
    <path d="M898 217h22"/>
    <path d="m912 208 12 9-12 9"/>
  </g>

  <g transform="translate(56 336)">
    <rect width="998" height="48" rx="12" fill="#ECFDF5" stroke="#99F6E4"/>
    <text x="20" y="30" fill="#0F766E" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">No hidden task files. No chat-memory dependency. Resume state is inferred from the artifact tree.</text>
  </g>
</svg>
